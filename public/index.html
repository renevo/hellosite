<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08070b">
    <meta name="description" content="A simple hello from the edge of the internet.">
    <title>Hello.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="/css/hello.css" rel="stylesheet">
</head>
<body>
    <canvas class="draft-field" aria-hidden="true"></canvas>
    <div class="grain" aria-hidden="true"></div>

    <main>
        <header class="masthead">
            <a class="wordmark" href="/" aria-label="Hello home">
                <span class="wordmark-mark" aria-hidden="true"></span>
                HELLO.SITE
            </a>
            <p class="status"><span aria-hidden="true"></span> Signal online</p>
        </header>

        <section class="hero" aria-labelledby="hello-title">
            <p class="eyebrow"><span>001</span> A very small corner of the internet</p>
            <h1 id="hello-title">HELLO<span aria-hidden="true">.</span></h1>
            <div class="hero-footer">
                <p>Nothing to announce.<br>Everything to begin.</p>
                <div class="coordinates" aria-label="Location">
                    <span>PLUM / 6F2DA8</span>
                    <span>WORLD WIDE WEB</span>
                </div>
            </div>
        </section>

        <footer class="page-footer">
            <p>EST. NOW</p>
            <p class="scroll-note">Built for the space between ideas</p>
            <p aria-label="Copyright">&copy; <span id="year"></span></p>
        </footer>
    </main>

    <script src="/hello.js"></script>
</body>
</html>
